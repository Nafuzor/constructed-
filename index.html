<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Bot Constructor PRO - V2 (Stable Engine)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { bgMain: '#0A0A0F', bgCard: '#14141C', panel: '#1C1C26', primary: '#6366F1' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <!-- FontAwesome & GSAP -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --grid-color: rgba(255, 255, 255, 0.05); }
        body { margin: 0; overflow: hidden; background-color: #0A0A0F; color: #fff; user-select: none; }
        
        /* Скроллбары */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366F1; }

        /* Рабочая область (Холст) */
        #workspace-container {
            position: relative; width: 100%; height: 100%; overflow: hidden;
            background-color: #0d0d14;
            background-image: radial-gradient(circle at 1px 1px, var(--grid-color) 1px, transparent 0);
            background-size: 20px 20px;
            cursor: grab;
        }
        #workspace-container:active { cursor: grabbing; }

        #canvas {
            position: absolute; top: 0; left: 0;
            transform-origin: 0 0;
            width: 0; height: 0;
            overflow: visible;
        }

        #svg-layer {
            position: absolute; top: 0; left: 0;
            width: 1px; height: 1px;
            overflow: visible; pointer-events: none;
            z-index: 1;
        }

        /* SVG Линии */
        .edge { fill: none; stroke: #6B7280; stroke-width: 3; transition: stroke 0.2s, stroke-width 0.2s; pointer-events: auto; cursor: pointer; }
        .edge:hover { stroke: #EF4444; stroke-width: 5; }
        .edge.active { stroke: #6366F1; stroke-width: 4; }
        .edge.temp { stroke: #8B5CF6; stroke-dasharray: 6 6; stroke-width: 3; pointer-events: none; }

        /* Блоки (Ноды) */
        .node {
            position: absolute; width: 280px;
            background: #1C1C26; border: 1px solid #374151; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
            display: flex; flex-direction: column; cursor: default;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .node:hover { border-color: #6366F1; z-index: 11; }
        .node.selected { border-color: #8B5CF6; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.4), 0 10px 30px rgba(0,0,0,0.5); z-index: 12; }
        
        .node-header {
            padding: 12px 16px; border-bottom: 1px solid #374151;
            border-top-left-radius: 11px; border-top-right-radius: 11px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: move; /* Drag handler */
        }
        .node-body { padding: 16px; font-size: 13px; color: #D1D5DB; flex-grow: 1; }
        
        /* Порты (Точки соединения) */
        .port-wrap { position: relative; display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .port {
            width: 16px; height: 16px; background: #1C1C26; border: 3px solid #6366F1; border-radius: 50%;
            position: absolute; cursor: crosshair; z-index: 20; transition: transform 0.2s, background 0.2s;
        }
        .port:hover { transform: scale(1.3); background: #6366F1; }
        .port-in { left: -25px; } /* Сдвиг за пределы ноды */
        .port-out { right: -25px; }

        /* Контекстное меню */
        #context-menu {
            position: fixed; display: none; z-index: 1000;
            background: rgba(28, 28, 38, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #374151; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 240px; padding: 8px 0;
        }
        .menu-item {
            padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: #D1D5DB; transition: background 0.1s;
        }
        .menu-item:hover { background: #374151; color: #fff; }

        /* UI Элементы */
        .panel { background: rgba(20, 20, 28, 0.95); border: 1px solid #2D3748; }
        .input-dark { background: #0A0A0F; border: 1px solid #374151; color: #fff; padding: 8px 12px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; transition: border 0.2s; }
        .input-dark:focus { border-color: #6366F1; }
    </style>
</head>
<body class="flex flex-col h-screen text-sm">

    <!-- HEADER -->
    <header class="h-16 panel flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-robot text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold">Bot Constructor <span class="text-indigo-400">PRO</span></h1>
            
            <div class="ml-8 hidden md:flex items-center gap-1 bg-gray-900 rounded-lg p-1 border border-gray-800">
                <button class="px-4 py-1.5 rounded-md bg-indigo-600 text-white font-medium shadow">Чат-бот</button>
                <button class="px-4 py-1.5 rounded-md text-gray-400 hover:text-white transition">MiniApp</button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <span class="text-gray-400 text-xs flex items-center gap-2" id="save-status">
                <i class="fa-solid fa-cloud-arrow-up"></i> Сохранено
            </span>
            <button onclick="clearWorkspace()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition border border-gray-700">
                <i class="fa-solid fa-trash-can mr-2"></i>Очистить
            </button>
            <button onclick="exportPython()" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white px-6 py-2 rounded-lg font-medium shadow-lg transition transform hover:-translate-y-0.5">
                <i class="fa-brands fa-python mr-2"></i>Экспорт .py
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- LEFT PANEL (Navigator) -->
        <div class="w-64 panel border-r border-gray-800 flex flex-col z-20 shrink-0">
            <div class="p-4 border-b border-gray-800">
                <h2 class="font-bold text-gray-200">Структура проекта</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="node-list">
                <!-- Node list generated here -->
            </div>
        </div>

        <!-- CENTER (Canvas) -->
        <div class="flex-1 relative" id="workspace-container">
            <!-- Controls Overlay -->
            <div class="absolute top-4 left-4 z-30 flex gap-2 bg-gray-900 border border-gray-700 p-1 rounded-lg shadow-xl">
                <button class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-white hover:bg-gray-700" onclick="engine.setZoom(0.1)" title="Приблизить"><i class="fa-solid fa-plus"></i></button>
                <button class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-white hover:bg-gray-700" onclick="engine.setZoom(-0.1)" title="Отдалить"><i class="fa-solid fa-minus"></i></button>
                <button class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-white hover:bg-gray-700" onclick="engine.resetView()" title="Сбросить"><i class="fa-solid fa-expand"></i></button>
            </div>
            
            <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 z-30 bg-gray-900/80 backdrop-blur border border-gray-700 px-6 py-2 rounded-full text-xs text-gray-400 shadow-xl pointer-events-none">
                <i class="fa-solid fa-mouse-right text-indigo-400 mr-2"></i> ПКМ — меню блоков | ЛКМ — перемещение холста
            </div>

            <!-- The actual scalable area -->
            <div id="canvas">
                <svg id="svg-layer"></svg>
                <!-- Nodes are injected here -->
            </div>
        </div>

        <!-- RIGHT PANEL (Properties) -->
        <div class="w-80 panel border-l border-gray-800 flex flex-col z-20 shrink-0 bg-[#1C1C26]">
            <div class="p-4 border-b border-gray-800 bg-[#14141C]">
                <h2 class="font-bold text-gray-200">Свойства блока</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-5" id="properties-panel">
                <div class="text-center text-gray-600 mt-20">
                    <i class="fa-regular fa-hand-pointer text-4xl mb-4"></i>
                    <p>Выберите блок на холсте<br>для настройки</p>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu">
        <div class="px-4 py-2 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-700 mb-1">Добавить блок</div>
        <div class="menu-item" onclick="engine.createNode('start')"><i class="fa-solid fa-flag text-green-400 w-5"></i>Старт (Start)</div>
        <div class="menu-item" onclick="engine.createNode('message')"><i class="fa-solid fa-comment text-blue-400 w-5"></i>Сообщение</div>
        <div class="menu-item" onclick="engine.createNode('question')"><i class="fa-solid fa-circle-question text-orange-400 w-5"></i>Вопрос</div>
        <div class="menu-item" onclick="engine.createNode('condition')"><i class="fa-solid fa-code-branch text-red-400 w-5"></i>Условие</div>
        <div class="menu-item" onclick="engine.createNode('payment')"><i class="fa-solid fa-credit-card text-emerald-400 w-5"></i>Платеж</div>
        <div class="menu-item" onclick="engine.createNode('crm')"><i class="fa-solid fa-users text-purple-400 w-5"></i>Запись в CRM</div>
    </div>

    <script>
        /**
         * CORE ENGINE LOGIC (V2 - Completely rewritten for stability)
         * Architecture: State -> Render -> Events update State -> Render
         */

        // 1. КОНФИГУРАЦИЯ БЛОКОВ
        const NODE_TYPES = {
            'start': { name: 'Старт', color: '#10B981', icon: 'fa-flag', inputs: 0, outputs: [{id: 'out0', label: 'Следующий шаг'}], defaults: { command: '/start' } },
            'message': { name: 'Сообщение', color: '#3B82F6', icon: 'fa-comment', inputs: 1, outputs:[{id: 'out0', label: 'Далее'}], defaults: { text: 'Введите текст сообщения...' } },
            'question': { name: 'Вопрос', color: '#F97316', icon: 'fa-circle-question', inputs: 1, outputs:[{id: 'out0', label: 'Ответ получен'}], defaults: { text: 'Ваш вопрос?', variable: 'user_answer' } },
            'condition': { name: 'Условие', color: '#EF4444', icon: 'fa-code-branch', inputs: 1, outputs:[{id: 'true', label: 'Истина'}, {id: 'false', label: 'Ложь'}], defaults: { var: 'user_id', op: '==', val: '' } },
            'payment': { name: 'Платеж', color: '#10B981', icon: 'fa-credit-card', inputs: 1, outputs:[{id: 'success', label: 'Успешная оплата'}, {id: 'fail', label: 'Ошибка'}], defaults: { amount: 1000, provider: 'yookassa' } },
            'crm': { name: 'CRM Запись', color: '#A855F7', icon: 'fa-users', inputs: 1, outputs: [{id: 'out0', label: 'Готово'}], defaults: { system: 'amocrm', tag: 'new_lead' } }
        };

        // 2. ГЛАВНЫЙ КЛАСС ДВИЖКА
        class EditorEngine {
            constructor() {
                // DOM Elements
                this.container = document.getElementById('workspace-container');
                this.canvas = document.getElementById('canvas');
                this.svgLayer = document.getElementById('svg-layer');
                this.contextMenu = document.getElementById('context-menu');
                
                // State
                this.nodes =[];
                this.edges =[]; // { id, fromNode, fromPort, toNode, toPort }
                
                // View Transform
                this.scale = 1;
                this.panX = 0;
                this.panY = 0;
                
                // Interaction states
                this.isPanning = false;
                this.isDraggingNode = false;
                this.isConnecting = false;
                
                this.draggedNodeId = null;
                this.selectedNodeId = null;
                this.selectedEdgeId = null;
                
                this.tempConnection = { active: false, fromNode: null, fromPort: null, mouseX: 0, mouseY: 0 };
                this.menuPos = { x: 0, y: 0 }; // relative to canvas

                this.init();
            }

            init() {
                this.loadState();
                this.bindEvents();
                this.updateTransform();
                this.renderAll();
                
                // Center view initially if not loaded from cache
                if (this.nodes.length === 0) {
                    this.panX = this.container.clientWidth / 2;
                    this.panY = this.container.clientHeight / 2;
                    this.updateTransform();
                }
            }

            // --- MATH & COORDINATES ---
            
            // Преобразование координат мыши экрана в координаты холста (с учетом зума и панорамирования)
            screenToCanvas(clientX, clientY) {
                const rect = this.container.getBoundingClientRect();
                return {
                    x: (clientX - rect.left - this.panX) / this.scale,
                    y: (clientY - rect.top - this.panY) / this.scale
                };
            }

            updateTransform() {
                // Обновляем позицию сетки на фоне, чтобы она двигалась вместе с панорамированием
                this.container.style.backgroundPosition = `${this.panX}px ${this.panY}px`;
                this.container.style.backgroundSize = `${20 * this.scale}px ${20 * this.scale}px`;
                // Двигаем сам контейнер нод
                this.canvas.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.scale})`;
            }

            setZoom(delta) {
                const newScale = Math.max(0.3, Math.min(this.scale + delta, 2.5));
                
                // Зум относительно центра экрана
                const rect = this.container.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Математика компенсации сдвига при зуме
                this.panX = centerX - (centerX - this.panX) * (newScale / this.scale);
                this.panY = centerY - (centerY - this.panY) * (newScale / this.scale);
                this.scale = newScale;
                
                this.updateTransform();
            }

            resetView() {
                this.scale = 1;
                this.panX = this.container.clientWidth / 2;
                this.panY = this.container.clientHeight / 2;
                this.updateTransform();
            }

            // --- STATE MANAGEMENT ---

            saveState() {
                const data = { nodes: this.nodes, edges: this.edges };
                localStorage.setItem('tgBotProV2', JSON.stringify(data));
                
                // Анимация сохранения
                const ind = document.getElementById('save-status');
                ind.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Сохранение...';
                ind.classList.remove('text-gray-400'); ind.classList.add('text-green-400');
                setTimeout(() => {
                    ind.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Сохранено';
                    ind.classList.add('text-gray-400'); ind.classList.remove('text-green-400');
                }, 500);
            }

            loadState() {
                try {
                    const saved = localStorage.getItem('tgBotProV2');
                    if(saved) {
                        const parsed = JSON.parse(saved);
                        this.nodes = parsed.nodes || [];
                        this.edges = parsed.edges ||[];
                    }
                } catch(e) { console.error("Error loading state", e); }
            }

            clearAll() {
                this.nodes =[]; this.edges =[];
                this.selectedNodeId = null;
                this.saveState();
                this.renderAll();
                this.updatePropertiesPanel();
            }

            // --- NODE & EDGE OPERATIONS ---

            createNode(type) {
                if(type === 'start' && this.nodes.some(n => n.type === 'start')) {
                    alert('Блок "Старт" может быть только один!');
                    this.contextMenu.style.display = 'none';
                    return;
                }

                const id = 'node_' + Date.now().toString(36);
                const config = NODE_TYPES[type];
                
                const newNode = {
                    id: id,
                    type: type,
                    x: this.menuPos.x,
                    y: this.menuPos.y,
                    data: JSON.parse(JSON.stringify(config.defaults)) // deep copy
                };
                
                this.nodes.push(newNode);
                this.contextMenu.style.display = 'none';
                this.selectNode(id);
                this.saveState();
                this.renderAll();

                // Animation
                const el = document.getElementById(id);
                if(el) gsap.from(el, { scale: 0.8, opacity: 0, duration: 0.3, ease: 'back.out(1.5)' });
            }

            deleteNode(id) {
                this.nodes = this.nodes.filter(n => n.id !== id);
                // Удаляем связанные линии
                this.edges = this.edges.filter(e => e.fromNode !== id && e.toNode !== id);
                if(this.selectedNodeId === id) this.selectNode(null);
                this.saveState();
                this.renderAll();
            }

            deleteEdge(id) {
                this.edges = this.edges.filter(e => e.id !== id);
                this.saveState();
                this.renderEdges();
            }

            addEdge(fromNode, fromPort, toNode, toPort) {
                if(fromNode === toNode) return; // Защита от связи с самим собой
                
                // Если из этого порта уже есть линия, удаляем старую (один выход -> один вход)
                this.edges = this.edges.filter(e => !(e.fromNode === fromNode && e.fromPort === fromPort));
                
                this.edges.push({
                    id: 'edge_' + Date.now(),
                    fromNode, fromPort, toNode, toPort
                });
                this.saveState();
                this.renderEdges();
            }

            selectNode(id) {
                this.selectedNodeId = id;
                this.selectedEdgeId = null;
                document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
                if(id) document.getElementById(id).classList.add('selected');
                this.updatePropertiesPanel();
            }

            updateNodeData(key, value) {
                const node = this.nodes.find(n => n.id === this.selectedNodeId);
                if(node) {
                    node.data[key] = value;
                    this.saveState();
                    this.renderNodeContent(node); // Обновляем только текст внутри блока
                }
            }

            // --- RENDERING ---

            renderAll() {
                this.canvas.innerHTML = '';
                this.canvas.appendChild(this.svgLayer); // Возвращаем SVG слой
                
                const leftList = document.getElementById('node-list');
                leftList.innerHTML = '';

                this.nodes.forEach(node => {
                    // Создаем DOM элемент ноды
                    const el = document.createElement('div');
                    el.className = `node ${node.id === this.selectedNodeId ? 'selected' : ''}`;
                    el.id = node.id;
                    el.style.left = node.x + 'px';
                    el.style.top = node.y + 'px';
                    
                    const conf = NODE_TYPES[node.type];
                    
                    // Шапка
                    const header = document.createElement('div');
                    header.className = 'node-header';
                    header.style.borderTop = `4px solid ${conf.color}`;
                    header.dataset.dragHandle = node.id;
                    header.innerHTML = `
                        <span class="font-bold flex items-center gap-2"><i class="fa-solid ${conf.icon}" style="color:${conf.color}"></i> ${conf.name}</span>
                        ${node.type !== 'start' ? `<i class="fa-solid fa-xmark text-gray-500 hover:text-red-500 cursor-pointer delete-btn" data-id="${node.id}"></i>` : ''}
                    `;
                    el.appendChild(header);

                    // Тело (перерендериваемое)
                    const body = document.createElement('div');
                    body.className = 'node-body';
                    body.id = `body_${node.id}`;
                    el.appendChild(body);

                    this.canvas.appendChild(el);
                    this.renderNodeContent(node); // Заполняем тело

                    // Добавляем в левую панель
                    leftList.innerHTML += `
                        <div class="flex items-center gap-3 p-2 hover:bg-gray-800 rounded cursor-pointer text-gray-300 hover:text-white transition" onclick="engine.centerOnNode('${node.id}')">
                            <i class="fa-solid ${conf.icon}" style="color:${conf.color}"></i>
                            <span class="truncate text-xs">${conf.name}</span>
                        </div>
                    `;
                });

                this.renderEdges();
            }

            renderNodeContent(node) {
                const body = document.getElementById(`body_${node.id}`);
                if(!body) return;
                
                const conf = NODE_TYPES[node.type];
                let contentHTML = '';

                // Превью контента
                if(node.type === 'message') contentHTML = `<div class="bg-gray-800/50 p-2 rounded text-xs text-gray-400 mb-3 truncate border border-gray-700">${node.data.text || '...'}</div>`;
                if(node.type === 'condition') contentHTML = `<div class="font-mono text-xs text-indigo-300 mb-3 bg-indigo-900/30 p-2 rounded border border-indigo-900/50">if ${node.data.var} ${node.data.op} ${node.data.val}</div>`;
                if(node.type === 'payment') contentHTML = `<div class="text-emerald-400 font-bold mb-3">${node.data.amount} RUB</div>`;

                // Входной порт
                let inPortHTML = '';
                if(conf.inputs > 0) {
                    inPortHTML = `<div class="port port-in" data-type="in" data-node="${node.id}" data-port="in0"></div>`;
                }

                // Выходные порты
                let outPortsHTML = '';
                conf.outputs.forEach(out => {
                    outPortsHTML += `
                        <div class="port-wrap mt-2">
                            <span class="text-xs text-gray-500">${out.label}</span>
                            <div class="port port-out" data-type="out" data-node="${node.id}" data-port="${out.id}"></div>
                        </div>
                    `;
                });

                body.innerHTML = `
                    ${inPortHTML}
                    ${contentHTML}
                    <div class="mt-auto border-t border-gray-700/50 pt-2">
                        ${outPortsHTML}
                    </div>
                `;
            }

            renderEdges() {
                this.svgLayer.innerHTML = '';
                
                // Рендер сохраненных линий
                this.edges.forEach(edge => {
                    const fromEl = document.querySelector(`.port[data-node="${edge.fromNode}"][data-port="${edge.fromPort}"]`);
                    const toEl = document.querySelector(`.port[data-node="${edge.toNode}"][data-port="${edge.toPort}"]`);
                    
                    if(fromEl && toEl) {
                        // Вычисляем точные координаты центров портов относительно canvas
                        const fromRect = fromEl.getBoundingClientRect();
                        const toRect = toEl.getBoundingClientRect();
                        const canvasRect = this.canvas.getBoundingClientRect();
                        
                        const x1 = (fromRect.left + fromRect.width/2 - canvasRect.left) / this.scale;
                        const y1 = (fromRect.top + fromRect.height/2 - canvasRect.top) / this.scale;
                        const x2 = (toRect.left + toRect.width/2 - canvasRect.left) / this.scale;
                        const y2 = (toRect.top + toRect.height/2 - canvasRect.top) / this.scale;

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', this.getBezier(x1, y1, x2, y2));
                        path.setAttribute('class', `edge ${this.selectedEdgeId === edge.id ? 'active' : ''}`);
                        path.dataset.edgeId = edge.id;
                        this.svgLayer.appendChild(path);
                    }
                });

                // Рендер временной линии (во время перетаскивания)
                if(this.isConnecting && this.tempConnection.active) {
                    const fromEl = document.querySelector(`.port[data-node="${this.tempConnection.fromNode}"][data-port="${this.tempConnection.fromPort}"]`);
                    if(fromEl) {
                        const fromRect = fromEl.getBoundingClientRect();
                        const canvasRect = this.canvas.getBoundingClientRect();
                        const x1 = (fromRect.left + fromRect.width/2 - canvasRect.left) / this.scale;
                        const y1 = (fromRect.top + fromRect.height/2 - canvasRect.top) / this.scale;
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', this.getBezier(x1, y1, this.tempConnection.mouseX, this.tempConnection.mouseY));
                        path.setAttribute('class', 'edge temp');
                        this.svgLayer.appendChild(path);
                    }
                }
            }

            getBezier(x1, y1, x2, y2) {
                // Красивый изгиб линии Безье
                const dx = Math.max(Math.abs(x2 - x1) * 0.6, 50);
                return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
            }

            centerOnNode(id) {
                const node = this.nodes.find(n => n.id === id);
                if(node) {
                    const rect = this.container.getBoundingClientRect();
                    gsap.to(this, {
                        panX: rect.width / 2 - node.x * this.scale - 140, // 140 is half node width
                        panY: rect.height / 2 - node.y * this.scale - 50,
                        duration: 0.5,
                        onUpdate: () => this.updateTransform()
                    });
                    this.selectNode(id);
                }
            }

            // --- PROPERTIES PANEL (RIGHT) ---
            updatePropertiesPanel() {
                const panel = document.getElementById('properties-panel');
                if(!this.selectedNodeId) {
                    panel.innerHTML = `<div class="text-center text-gray-600 mt-20"><i class="fa-regular fa-hand-pointer text-4xl mb-4"></i><p>Выберите блок на холсте<br>для настройки</p></div>`;
                    return;
                }

                const node = this.nodes.find(n => n.id === this.selectedNodeId);
                const conf = NODE_TYPES[node.type];

                let html = `
                    <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-800">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl" style="background: ${conf.color}20; color: ${conf.color};">
                            <i class="fa-solid ${conf.icon}"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-base">${conf.name}</h3>
                            <span class="text-xs text-gray-500">ID: ${node.id.split('_')[1]}</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                `;

                // Генерация полей в зависимости от типа ноды
                if(node.type === 'start') {
                    html += `
                        <div><label class="block text-xs text-gray-400 mb-1">Команда запуска</label>
                        <input type="text" class="input-dark font-mono text-indigo-400" value="${node.data.command}" onchange="engine.updateNodeData('command', this.value)"></div>
                    `;
                }
                else if(node.type === 'message') {
                    html += `
                        <div><label class="block text-xs text-gray-400 mb-1">Текст сообщения</label>
                        <textarea class="input-dark h-32 resize-none" oninput="engine.updateNodeData('text', this.value)">${node.data.text}</textarea></div>
                        <button class="w-full bg-gray-800 hover:bg-gray-700 border border-gray-700 py-2 rounded text-gray-300 text-xs transition"><i class="fa-solid fa-paperclip mr-2"></i>Прикрепить файл</button>
                    `;
                }
                else if(node.type === 'condition') {
                    html += `
                        <div><label class="block text-xs text-gray-400 mb-1">Переменная (напр. {{user_id}})</label>
                        <input type="text" class="input-dark font-mono" value="${node.data.var}" onchange="engine.updateNodeData('var', this.value)"></div>
                        
                        <div><label class="block text-xs text-gray-400 mb-1">Условие</label>
                        <select class="input-dark" onchange="engine.updateNodeData('op', this.value)">
                            <option value="==" ${node.data.op==='=='?'selected':''}>Равно (==)</option>
                            <option value="!=" ${node.data.op==='!='?'selected':''}>Не равно (!=)</option>
                            <option value=">" ${node.data.op==='>'?'selected':''}>Больше (>)</option>
                            <option value="<" ${node.data.op==='<'?'selected':''}>Меньше (<)</option>
                            <option value="contains" ${node.data.op==='contains'?'selected':''}>Содержит</option>
                        </select></div>

                        <div><label class="block text-xs text-gray-400 mb-1">Значение для сравнения</label>
                        <input type="text" class="input-dark" value="${node.data.val}" onchange="engine.updateNodeData('val', this.value)"></div>
                    `;
                }
                else if(node.type === 'payment') {
                    html += `
                        <div><label class="block text-xs text-gray-400 mb-1">Сумма (RUB)</label>
                        <input type="number" class="input-dark text-emerald-400 font-bold" value="${node.data.amount}" onchange="engine.updateNodeData('amount', this.value)"></div>
                        
                        <div><label class="block text-xs text-gray-400 mb-1">Провайдер</label>
                        <select class="input-dark" onchange="engine.updateNodeData('provider', this.value)">
                            <option value="yookassa" ${node.data.provider==='yookassa'?'selected':''}>ЮKassa</option>
                            <option value="tbank" ${node.data.provider==='tbank'?'selected':''}>Т-Банк</option>
                            <option value="crypto" ${node.data.provider==='crypto'?'selected':''}>Crypto Pay</option>
                        </select></div>
                    `;
                }
                else {
                    // Generic fallback
                    Object.keys(node.data).forEach(key => {
                        html += `<div><label class="block text-xs text-gray-400 mb-1">${key}</label>
                        <input type="text" class="input-dark" value="${node.data[key]}" onchange="engine.updateNodeData('${key}', this.value)"></div>`;
                    });
                }

                html += `</div>`;
                panel.innerHTML = html;
            }

            // --- EVENT BINDING (EVENT DELEGATION) ---
            bindEvents() {
                // Предотвращаем стандартный контекст по всему контейнеру
                this.container.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    const canvasPos = this.screenToCanvas(e.clientX, e.clientY);
                    this.menuPos = { x: canvasPos.x, y: canvasPos.y };
                    
                    this.contextMenu.style.left = e.clientX + 'px';
                    this.contextMenu.style.top = e.clientY + 'px';
                    this.contextMenu.style.display = 'block';
                });

                // Глобальный клик (закрытие меню, сброс выделения)
                window.addEventListener('mousedown', e => {
                    if(!this.contextMenu.contains(e.target)) {
                        this.contextMenu.style.display = 'none';
                    }
                });

                // Mouse Down (Delegated)
                this.container.addEventListener('mousedown', e => {
                    if (e.button !== 0) return; // Only Left Click
                    
                    const target = e.target;
                    
                    // 1. Клик по кнопке "Удалить"
                    if (target.classList.contains('delete-btn')) {
                        this.deleteNode(target.dataset.id);
                        return;
                    }

                    // 2. Клик по линии связи (Edge)
                    if (target.classList.contains('edge') && !target.classList.contains('temp')) {
                        this.selectedEdgeId = target.dataset.edgeId;
                        this.selectNode(null);
                        this.renderEdges();
                        return;
                    }

                    // 3. Старт перетаскивания ноды (клик по Header)
                    const dragHandle = target.closest('[data-drag-handle]');
                    if (dragHandle) {
                        this.isDraggingNode = true;
                        this.draggedNodeId = dragHandle.dataset.dragHandle;
                        this.selectNode(this.draggedNodeId);
                        
                        // Вычисляем смещение мыши относительно левого верхнего угла ноды
                        const node = this.nodes.find(n => n.id === this.draggedNodeId);
                        const canvasPos = this.screenToCanvas(e.clientX, e.clientY);
                        this.dragOffsetX = canvasPos.x - node.x;
                        this.dragOffsetY = canvasPos.y - node.y;
                        return;
                    }

                    // 4. Старт создания связи (клик по выходному порту)
                    if (target.classList.contains('port-out')) {
                        this.isConnecting = true;
                        this.tempConnection.active = true;
                        this.tempConnection.fromNode = target.dataset.node;
                        this.tempConnection.fromPort = target.dataset.port;
                        const pos = this.screenToCanvas(e.clientX, e.clientY);
                        this.tempConnection.mouseX = pos.x;
                        this.tempConnection.mouseY = pos.y;
                        return;
                    }

                    // 5. Клик по телу ноды (просто выделить)
                    const nodeEl = target.closest('.node');
                    if (nodeEl) {
                        this.selectNode(nodeEl.id);
                        return;
                    }

                    // 6. Клик по пустому месту (Панорамирование + Сброс выделения)
                    this.isPanning = true;
                    this.panStartX = e.clientX - this.panX;
                    this.panStartY = e.clientY - this.panY;
                    this.selectNode(null);
                    this.selectedEdgeId = null;
                    this.renderEdges();
                });

                // Mouse Move (Global)
                window.addEventListener('mousemove', e => {
                    // Панорамирование
                    if (this.isPanning) {
                        this.panX = e.clientX - this.panStartX;
                        this.panY = e.clientY - this.panStartY;
                        this.updateTransform();
                    }
                    
                    // Перемещение блока
                    if (this.isDraggingNode && this.draggedNodeId) {
                        const canvasPos = this.screenToCanvas(e.clientX, e.clientY);
                        const node = this.nodes.find(n => n.id === this.draggedNodeId);
                        
                        // Привязка к сетке 20px
                        const snap = 20;
                        node.x = Math.round((canvasPos.x - this.dragOffsetX) / snap) * snap;
                        node.y = Math.round((canvasPos.y - this.dragOffsetY) / snap) * snap;
                        
                        const el = document.getElementById(node.id);
                        if(el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
                        
                        this.renderEdges(); // Плавно перерисовываем линии
                    }

                    // Рисование линии
                    if (this.isConnecting) {
                        const pos = this.screenToCanvas(e.clientX, e.clientY);
                        this.tempConnection.mouseX = pos.x;
                        this.tempConnection.mouseY = pos.y;
                        this.renderEdges(); // Обновляем временную линию
                    }
                });

                // Mouse Up (Global)
                window.addEventListener('mouseup', e => {
                    if (this.isPanning) this.isPanning = false;
                    
                    if (this.isDraggingNode) {
                        this.isDraggingNode = false;
                        this.draggedNodeId = null;
                        this.saveState();
                    }

                    if (this.isConnecting) {
                        this.isConnecting = false;
                        this.tempConnection.active = false;
                        
                        // Если отпустили над входным портом (port-in)
                        const target = document.elementFromPoint(e.clientX, e.clientY);
                        if (target && target.classList.contains('port-in')) {
                            const toNode = target.dataset.node;
                            const toPort = target.dataset.port;
                            this.addEdge(this.tempConnection.fromNode, this.tempConnection.fromPort, toNode, toPort);
                        } else {
                            this.renderEdges(); // Просто удаляем временную линию
                        }
                    }
                });

                // Клавиатура
                window.addEventListener('keydown', e => {
                    // Удаление выделенного объекта клавишей Delete или Backspace
                    if ((e.key === 'Delete' || e.key === 'Backspace') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        if (this.selectedNodeId) {
                            this.deleteNode(this.selectedNodeId);
                        } else if (this.selectedEdgeId) {
                            this.deleteEdge(this.selectedEdgeId);
                        }
                    }
                });
            }
        }

        // 3. ЗАПУСК И ГЛОБАЛЬНЫЕ ФУНКЦИИ
        let engine;
        window.onload = () => {
            engine = new EditorEngine();
        };

        function clearWorkspace() {
            if(confirm('Точно удалить все блоки? Действие нельзя отменить.')) {
                engine.clearAll();
            }
        }

        // 4. ЭКСПОРТ PYTHON КОДА (Связывает логику графа)
        function exportPython() {
            if(engine.nodes.length === 0) {
                alert('Добавьте хотя бы один блок!'); return;
            }

            const projName = "MyTelegramBot";
            let code = `import telebot\nfrom telebot import types\n\nTOKEN = 'YOUR_BOT_TOKEN_HERE'\nbot = telebot.TeleBot(TOKEN)\n\nuser_state = {}\nuser_data = {}\n\n`;

            // Поиск стартового блока
            const startNode = engine.nodes.find(n => n.type === 'start');
            const startNodeId = startNode ? startNode.id : engine.nodes[0].id;

            // Формируем граф связей для Python
            const pyGraph = {};
            engine.nodes.forEach(node => {
                pyGraph[node.id] = { type: node.type, data: node.data, next: {} };
            });
            
            engine.edges.forEach(edge => {
                if(!pyGraph[edge.fromNode].next) pyGraph[edge.fromNode].next = {};
                pyGraph[edge.fromNode].next[edge.fromPort] = edge.toNode;
            });

            code += `GRAPH = ${JSON.stringify(pyGraph, null, 4).replace(/null/g, 'None').replace(/true/g, 'True').replace(/false/g, 'False')}\n\n`;

            code += `
def process_node(chat_id, node_id):
    if not node_id or node_id not in GRAPH: return
    
    node = GRAPH[node_id]
    n_type = node['type']
    data = node['data']
    next_nodes = node.get('next', {})
    
    user_state[chat_id] = node_id

    if n_type == 'start' or n_type == 'message':
        text = data.get('text', data.get('command', 'Привет!'))
        bot.send_message(chat_id, text, parse_mode='HTML')
        if 'out0' in next_nodes:
            process_node(chat_id, next_nodes['out0'])
            
    elif n_type == 'question':
        text = data.get('text', 'Вопрос')
        msg = bot.send_message(chat_id, text)
        bot.register_next_step_handler(msg, handle_answer, node_id)
        
    elif n_type == 'condition':
        var_name = data.get('var', '')
        op = data.get('op', '==')
        val = data.get('val', '')
        
        user_val = str(user_data.get(chat_id, {}).get(var_name, ''))
        
        is_true = False
        if op == '==': is_true = (user_val == val)
        elif op == '!=': is_true = (user_val != val)
        elif op == '>': is_true = (user_val.isdigit() and val.isdigit() and int(user_val) > int(val))
        elif op == '<': is_true = (user_val.isdigit() and val.isdigit() and int(user_val) < int(val))
        elif op == 'contains': is_true = (val.lower() in user_val.lower())
        
        next_step = next_nodes.get('true') if is_true else next_nodes.get('false')
        if next_step: process_node(chat_id, next_step)

def handle_answer(message, node_id):
    chat_id = message.chat.id
    node = GRAPH[node_id]
    var_name = node['data'].get('variable', 'answer')
    
    if chat_id not in user_data: user_data[chat_id] = {}
    user_data[chat_id][var_name] = message.text
    
    next_step = node.get('next', {}).get('out0')
    if next_step: process_node(chat_id, next_step)

@bot.message_handler(commands=['start'])
def start_cmd(message):
    process_node(message.chat.id, '${startNodeId}')

print("Bot is running...")
bot.polling(none_stop=True)
`;

            const blob = new Blob([code], { type: 'text/x-python' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bot_script.py`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
