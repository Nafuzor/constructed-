<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Builder | Visual Constructor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0F;
            color: white;
            overflow: hidden;
        }
        .canvas-bg {
            background-image: radial-gradient(#1A1A24 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .block-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: move;
            position: absolute;
            z-index: 10;
        }
        .block-card:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        .neon-border {
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .code-font { font-family: 'Fira Code', monospace; }
        
        /* Линии связей */
        #connections-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100% !important; height: auto; }
            .canvas-container { height: 50vh; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- HEADER -->
    <header class="h-16 border-b border-gray-800 bg-[#0A0A0F] px-6 flex items-center justify-between z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i data-lucide="bot" class="w-5 h-5"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight">TG <span class="text-indigo-500">Builder</span></h1>
        </div>

        <div class="flex items-center gap-4">
            <input type="text" id="bot-token" placeholder="Введите API Токен..." 
                   class="bg-[#1A1A24] border border-gray-700 rounded-md px-4 py-1.5 text-sm focus:outline-none focus:border-indigo-500 w-64 transition-all">
            <button onclick="exportBot()" class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-5 py-1.5 rounded-md text-sm font-semibold flex items-center gap-2 transition-all neon-glow">
                <i data-lucide="download" class="w-4 h-4"></i>
                Скачать бота
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden main-layout">
        
        <!-- LEFT SIDEBAR: Blocks Library -->
        <aside class="w-72 border-r border-gray-800 bg-[#0D0D14] p-6 sidebar overflow-y-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">Доступные блоки</h2>
            
            <div class="space-y-4">
                <div draggable="true" ondragstart="drag(event, 'start')" class="p-4 bg-[#1A1A24] border-l-4 border-green-500 rounded-r-lg cursor-grab active:cursor-grabbing hover:bg-[#22222E] transition-colors group">
                    <div class="flex items-center gap-3">
                        <i data-lucide="play-circle" class="text-green-500"></i>
                        <span class="font-medium">Старт</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 italic">Точка входа (/start)</p>
                </div>

                <div draggable="true" ondragstart="drag(event, 'message')" class="p-4 bg-[#1A1A24] border-l-4 border-blue-500 rounded-r-lg cursor-grab active:cursor-grabbing hover:bg-[#22222E] transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="message-square" class="text-blue-500"></i>
                        <span class="font-medium">Сообщение</span>
                    </div>
                </div>

                <div draggable="true" ondragstart="drag(event, 'question')" class="p-4 bg-[#1A1A24] border-l-4 border-orange-500 rounded-r-lg cursor-grab active:cursor-grabbing hover:bg-[#22222E] transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="help-circle" class="text-orange-500"></i>
                        <span class="font-medium">Вопрос</span>
                    </div>
                </div>

                <div draggable="true" ondragstart="drag(event, 'buttons')" class="p-4 bg-[#1A1A24] border-l-4 border-purple-500 rounded-r-lg cursor-grab active:cursor-grabbing hover:bg-[#22222E] transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="layout" class="text-purple-500"></i>
                        <span class="font-medium">Кнопки</span>
                    </div>
                </div>
            </div>

            <div class="mt-12 p-4 bg-indigo-900/20 rounded-xl border border-indigo-500/30">
                <h3 class="text-sm font-semibold text-indigo-300 flex items-center gap-2 mb-2">
                    <i data-lucide="info" class="w-4 h-4"></i> Совет
                </h3>
                <p class="text-xs text-indigo-200/70 leading-relaxed">
                    Перетащите блок на холст. Используйте ID в настройках блоков для создания переходов.
                </p>
            </div>
        </aside>

        <!-- MAIN CANVAS -->
        <main class="flex-1 relative canvas-bg overflow-hidden canvas-container" id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)">
            <svg id="connections-layer"></svg>
            <div id="blocks-container"></div>
            
            <!-- Инструкция на пустом холсте -->
            <div id="empty-hint" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-20">
                <i data-lucide="mouse-pointer-2" class="w-16 h-16 mb-4"></i>
                <p class="text-xl font-light italic">Перетащите сюда первый блок</p>
            </div>
        </main>

        <!-- RIGHT SIDEBAR: Settings -->
        <aside id="settings-panel" class="w-80 border-l border-gray-800 bg-[#0D0D14] p-6 hidden">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-lg font-bold">Настройки блока</h2>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-white">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="settings-content" class="space-y-6">
                <!-- Контент генерируется динамически -->
            </div>

            <div class="mt-8 pt-6 border-t border-gray-800">
                <button onclick="deleteBlock()" class="w-full py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    Удалить блок
                </button>
            </div>
        </aside>
    </div>

    <!-- SCRIPTS -->
    <script>
        // Инициализация иконок
        lucide.createIcons();

        let blocks = [];
        let selectedBlockId = null;
        let blockCounter = 0;

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev, type) {
            ev.dataTransfer.setData("type", type);
        }

        function drop(ev) {
            ev.preventDefault();
            const type = ev.dataTransfer.getData("type");
            const rect = document.getElementById('canvas').getBoundingClientRect();
            const x = ev.clientX - rect.left - 100;
            const y = ev.clientY - rect.top - 40;

            if (blocks.length >= 10) {
                alert("Достигнут лимит MVP (10 блоков)");
                return;
            }

            addBlock(type, x, y);
        }

        function addBlock(type, x, y) {
            const id = `block_${Date.now()}`;
            const blockNum = ++blockCounter;
            
            const newBlock = {
                id: id,
                num: blockNum,
                type: type,
                x: x,
                y: y,
                data: getDefaultData(type)
            };

            blocks.push(newBlock);
            renderBlock(newBlock);
            document.getElementById('empty-hint').style.display = 'none';
        }

        function getDefaultData(type) {
            switch(type) {
                case 'start': return { command: '/start', next: '' };
                case 'message': return { text: 'Привет! Я новый бот.', next: '' };
                case 'question': return { text: 'Как тебя зовут?', variable: 'user_name', next: '' };
                case 'buttons': return { text: 'Выберите опцию:', buttons: 'Да:ID_блока\nНет:ID_блока' };
                default: return {};
            }
        }

        function renderBlock(block) {
            const container = document.getElementById('blocks-container');
            const div = document.createElement('div');
            div.id = block.id;
            div.className = `block-card p-4 rounded-xl w-52 bg-[#1A1A24] border-t-4 shadow-xl ${getBorderColor(block.type)}`;
            div.style.left = `${block.x}px`;
            div.style.top = `${block.y}px`;
            
            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] bg-gray-800 px-2 py-0.5 rounded text-gray-400 font-mono">ID: ${block.num}</span>
                    <i data-lucide="${getIcon(block.type)}" class="w-4 h-4 opacity-50"></i>
                </div>
                <div class="text-sm font-semibold mb-1 truncate">${getBlockTitle(block.type)}</div>
                <div class="text-[10px] text-gray-500 truncate italic">${getSnippet(block)}</div>
            `;

            div.onclick = (e) => {
                e.stopPropagation();
                openSettings(block.id);
            };

            // Перетаскивание внутри холста
            makeDraggable(div, block);

            container.appendChild(div);
            lucide.createIcons();
        }

        function getBorderColor(type) {
            const colors = { start: 'border-green-500', message: 'border-blue-500', question: 'border-orange-500', buttons: 'border-purple-500' };
            return colors[type] || 'border-indigo-500';
        }

        function getIcon(type) {
            const icons = { start: 'play-circle', message: 'message-square', question: 'help-circle', buttons: 'layout' };
            return icons[type] || 'box';
        }

        function getBlockTitle(type) {
            const titles = { start: 'Старт', message: 'Сообщение', question: 'Вопрос', buttons: 'Меню кнопок' };
            return titles[type];
        }

        function getSnippet(block) {
            if (block.type === 'start') return block.data.command;
            if (block.data.text) return block.data.text.substring(0, 20) + '...';
            return 'Настройте блок';
        }

        function makeDraggable(elmnt, blockObj) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                blockObj.x = elmnt.offsetLeft;
                blockObj.y = elmnt.offsetTop;
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function openSettings(id) {
            selectedBlockId = id;
            const block = blocks.find(b => b.id === id);
            const panel = document.getElementById('settings-panel');
            const content = document.getElementById('settings-content');
            
            panel.classList.remove('hidden');
            
            let html = `<div><label class="text-xs text-gray-500 block mb-2">Заголовок / Описание</label>
                        <p class="text-sm font-bold text-indigo-400">${getBlockTitle(block.type)} (Блок №${block.num})</p></div>`;

            if (block.type === 'start') {
                html += createField('Команда', 'command', block.data.command, 'text', 'Напр: /start');
                html += createField('Перейти к блоку ID', 'next', block.data.next, 'number');
            } else if (block.type === 'message') {
                html += createField('Текст сообщения', 'text', block.data.text, 'textarea');
                html += createField('Затем перейти к ID', 'next', block.data.next, 'number');
            } else if (block.type === 'question') {
                html += createField('Вопрос', 'text', block.data.text, 'textarea');
                html += createField('Имя переменной', 'variable', block.data.variable, 'text', 'Напр: username');
                html += createField('Затем перейти к ID', 'next', block.data.next, 'number');
            } else if (block.type === 'buttons') {
                html += createField('Текст сообщения', 'text', block.data.text, 'textarea');
                html += createField('Кнопки (Текст:ID блока)', 'buttons', block.data.buttons, 'textarea', 'Да:2\nНет:3');
            }

            content.innerHTML = html;
        }

        function createField(label, key, value, type, placeholder = '') {
            const inputClass = "w-full bg-[#1A1A24] border border-gray-700 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-all text-white mt-1";
            let input = '';
            if (type === 'textarea') {
                input = `<textarea oninput="updateBlockData('${key}', this.value)" class="${inputClass} h-24">${value}</textarea>`;
            } else {
                input = `<input type="${type}" value="${value}" oninput="updateBlockData('${key}', this.value)" placeholder="${placeholder}" class="${inputClass}">`;
            }
            return `<div class="block"><label class="text-xs text-gray-400">${label}</label>${input}</div>`;
        }

        function updateBlockData(key, value) {
            const block = blocks.find(b => b.id === selectedBlockId);
            block.data[key] = value;
            
            // Обновляем визуальный сниппет на карточке
            const card = document.getElementById(selectedBlockId);
            const snippet = card.querySelector('.italic');
            snippet.innerText = getSnippet(block);
        }

        function closeSettings() {
            document.getElementById('settings-panel').classList.add('hidden');
            selectedBlockId = null;
        }

        function deleteBlock() {
            if (!selectedBlockId) return;
            blocks = blocks.filter(b => b.id !== selectedBlockId);
            document.getElementById(selectedBlockId).remove();
            closeSettings();
            if (blocks.length === 0) {
                document.getElementById('empty-hint').style.display = 'flex';
            }
        }

        // --- ГЕНЕРАЦИЯ PYTHON КОДА ---

        function exportBot() {
            const token = document.getElementById('bot-token').value || '{YOUR_BOT_TOKEN}';
            
            let code = `import telebot\nfrom telebot import types\n\n`;
            code += `bot = telebot.TeleBot('${token}')\n`;
            code += `user_states = {} # Состояния пользователей\n`;
            code += `user_data = {}   # Хранилище ответов пользователей\n\n`;

            // Обработка блока СТАРТ
            const startBlock = blocks.find(b => b.type === 'start');
            if (startBlock) {
                code += `# Блок Старт\n@bot.message_handler(commands=['${startBlock.data.command.replace('/', '')}'])\n`;
                code += `def start_handler(message):\n`;
                code += `    chat_id = message.chat.id\n`;
                code += generateTransitionCode(startBlock.data.next, 4);\n\n`;
            }

            // Главный обработчик сообщений
            code += `# Главный обработчик логики\n@bot.message_handler(content_types=['text'])\n`;
            code += `def handle_text(message):\n`;
            code += `    chat_id = message.chat.id\n`;
            code += `    state = user_states.get(chat_id, None)\n\n`;

            blocks.forEach(block => {
                if (block.type === 'start') return;

                code += `    if state == 'block_${block.num}':\n`;
                if (block.type === 'question') {
                    code += `        user_data[chat_id] = {'${block.data.variable}': message.text}\n`;
                }
                
                if (block.type === 'buttons') {
                    code += `        # Обработка кнопок\n`;
                    const btns = block.data.buttons.split('\n');
                    btns.forEach(line => {
                        const [label, target] = line.split(':');
                        if (label && target) {
                            code += `        if message.text == '${label}':\n`;
                            code += generateTransitionCode(target, 12);
                        }
                    });
                } else {
                    code += generateTransitionCode(block.data.next, 8);
                }
                code += `\n`;
            });

            code += `\n# Функция переходов\ndef move_to_block(chat_id, block_id):\n`;
            code += `    user_states[chat_id] = block_id\n`;
            blocks.forEach(block => {
                code += `    if block_id == 'block_${block.num}':\n`;
                if (block.type === 'buttons') {
                    code += `        markup = types.ReplyKeyboardMarkup(resize_keyboard=True)\n`;
                    const btns = block.data.buttons.split('\n');
                    btns.forEach(line => {
                        const label = line.split(':')[0];
                        if (label) code += `        markup.add(types.KeyboardButton('${label}'))\n`;
                    });
                    code += `        bot.send_message(chat_id, "${block.data.text}", reply_markup=markup)\n`;
                } else {
                    code += `        bot.send_message(chat_id, "${block.data.text || ''}", reply_markup=types.ReplyKeyboardRemove())\n`;
                    // Если блок "Сообщение" просто проходной, ведем дальше
                    if (block.type === 'message' && block.data.next) {
                        code += `        move_to_block(chat_id, 'block_${block.data.next}')\n`;
                    }
                }
            });

            code += `\n\nbot.polling(none_stop=True)`;

            downloadFile('telegram_bot.py', code);
        }

        function generateTransitionCode(targetId, indentSize) {
            const indent = ' '.repeat(indentSize);
            if (!targetId) return `${i
