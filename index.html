<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Builder - STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0F', card: '#1A1A24', primary: '#6366F1', accent: '#8B5CF6',
                        bstart: '#10B981', bmsg: '#3B82F6', bask: '#F59E0B', bmedia: '#EC4899', 
                        bcond: '#14B8A6', bdelay: '#EAB308', brand: '#8B5CF6'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Courier New', 'monospace'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0F; color: white; overflow: hidden; margin: 0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0F; }
        ::-webkit-scrollbar-thumb { background: #333344; border-radius: 4px; }
        
        #canvas-wrapper { position: relative; width: 100%; height: 100%; overflow: auto; background-color: #0A0A0F; cursor: grab; }
        #canvas-wrapper:active { cursor: grabbing; }
        #canvas { position: relative; width: 5000px; height: 5000px; background-image: radial-gradient(#2A2A35 1px, transparent 1px); background-size: 20px 20px; transform-origin: 0 0; }
        #svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .connection-line { stroke: #8B5CF6; stroke-width: 3; fill: none; pointer-events: all; cursor: pointer; transition: stroke 0.2s, stroke-width 0.2s; }
        .connection-line:hover { stroke: #EF4444; stroke-width: 5; } 
        
        .node-block { position: absolute; width: 250px; border-radius: 12px; background: linear-gradient(145deg, #1A1A24, #12121a); box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 2px solid transparent; user-select: none; z-index: 10; transition: box-shadow 0.2s; }
        .node-block.selected { border-color: #8B5CF6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.5); z-index: 11; }
        
        .header-start { border-top: 4px solid #10B981; }
        .header-message { border-top: 4px solid #3B82F6; }
        .header-question { border-top: 4px solid #F59E0B; }
        .header-media { border-top: 4px solid #EC4899; }
        .header-condition { border-top: 4px solid #14B8A6; }
        .header-delay { border-top: 4px solid #EAB308; }
        .header-random { border-top: 4px solid #8B5CF6; }

        .port { width: 16px; height: 16px; border-radius: 50%; background: #0A0A0F; border: 3px solid #6366F1; position: absolute; cursor: crosshair; z-index: 15; transition: 0.2s; }
        .port:hover { transform: scale(1.4); background: #6366F1; }
        .port-in { left: -8px; top: 50%; transform: translateY(-50%); border-color: #fff; }
        .port-in:hover { background: #fff; transform: translateY(-50%) scale(1.4); }
        .port-out { right: -8px; top: 50%; transform: translateY(-50%); }
        
        .node-btn { position: relative; background: #2A2A35; padding: 6px 10px; border-radius: 6px; font-size: 11px; margin-bottom: 5px; border: 1px solid #3f3f4e; display: flex; align-items: center; justify-content: space-between; font-weight: 500;}
        .node-btn .port-out { top: 50%; transform: translateY(-50%); right: -8px; }

        #context-menu { position: absolute; background: #1A1A24; border: 1px solid #333344; border-radius: 8px; padding: 5px; min-width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); z-index: 100; }
        .ctx-item { padding: 10px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; border-radius: 5px; transition: 0.1s; }
        .ctx-item:hover { background: #2A2A35; color: #fff; }
    </style>
</head>
<body>

    <!-- Стартовое меню -->
    <div id="view-menu" class="h-screen flex flex-col items-center justify-center relative bg-dark z-50">
        <div class="relative z-10 text-center mb-10">
            <div class="w-24 h-24 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-emerald-500 flex items-center justify-center font-bold text-4xl shadow-[0_0_40px_rgba(16,185,129,0.5)] mb-6">TB</div>
            <h1 class="text-5xl font-black mb-3 tracking-tight">Bot Builder <span class="text-emerald-400">STABLE</span></h1>
            <p class="text-gray-400 text-lg">Версия с гарантированно работающими кнопками</p>
        </div>
        <div class="relative z-10 flex flex-col gap-4 w-72">
            <button onclick="createNewProject()" class="bg-primary hover:bg-indigo-500 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg text-lg">Создать бота</button>
            <button onclick="showProjectsList()" class="bg-card border border-gray-700 hover:border-gray-500 py-3.5 rounded-xl font-bold transition-all text-lg">Мои проекты</button>
        </div>
        
        <div id="projects-list" class="hidden absolute inset-0 bg-dark/95 flex flex-col items-center pt-24 z-20">
            <h2 class="text-3xl font-bold mb-8">Сохраненные проекты</h2>
            <div id="projects-container" class="w-full max-w-lg space-y-3 max-h-[60vh] overflow-y-auto px-4"></div>
            <button onclick="hideProjectsList()" class="mt-8 text-gray-400 hover:text-white underline text-lg">← Назад</button>
        </div>
    </div>

    <!-- Рабочая область -->
    <div id="view-workspace" class="hidden h-screen flex flex-col">
        <header class="bg-card border-b border-gray-800 p-3 flex justify-between items-center z-20 shadow-lg">
            <div class="flex items-center gap-4">
                <button onclick="backToMenu()" class="text-gray-400 hover:text-white px-3 py-1.5 bg-dark rounded border border-gray-700 text-sm font-medium">← Меню</button>
                <div class="font-bold text-gray-300">Проект: <span id="project-name-display" class="text-white"></span></div>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="bot-token" placeholder="Токен от @BotFather" class="bg-dark border border-gray-700 rounded-lg px-4 py-2 text-sm w-72 focus:border-primary outline-none transition-all">
                <button onclick="saveProject()" class="bg-card border border-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">Сохранить</button>
                <button onclick="exportBot()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)]">Скачать .py</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden relative">
            <div id="canvas-wrapper" oncontextmenu="showContextMenu(event)" onmousedown="startPan(event)">
                <div id="canvas">
                    <svg id="svg-canvas"></svg>
                    <div id="nodes-container" class="absolute inset-0"></div>
                </div>
            </div>

            <!-- Правая панель настроек -->
            <div id="settings-panel" class="w-80 bg-card border-l border-gray-800 flex flex-col z-20 shadow-2xl overflow-y-auto transform translate-x-full transition-transform duration-300 absolute right-0 h-full">
                <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-black/20">
                    <h2 class="text-sm font-bold text-white uppercase tracking-wider">Настройки блока</h2>
                    <button onclick="closeSettings()" class="text-gray-500 hover:text-white text-2xl leading-none">&times;</button>
                </div>
                <div id="settings-content" class="p-5 text-sm text-gray-500">Кликните на блок на холсте</div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню (ПКМ) -->
    <div id="context-menu" class="hidden text-gray-300">
        <div class="px-3 py-2 text-[10px] text-gray-500 uppercase font-black tracking-widest">Отправка</div>
        <div class="ctx-item" onclick="addBlock('start')"><span class="text-bstart text-xl">●</span> Старт (Команда)</div>
        <div class="ctx-item" onclick="addBlock('message')"><span class="text-bmsg text-xl">●</span> Сообщение</div>
        <div class="ctx-item" onclick="addBlock('media')"><span class="text-bmedia text-xl">●</span> Фотография</div>
        <div class="px-3 py-2 text-[10px] text-gray-500 uppercase font-black tracking-widest border-t border-gray-800 mt-1">Логика</div>
        <div class="ctx-item" onclick="addBlock('question')"><span class="text-bask text-xl">●</span> Задать вопрос</div>
        <div class="ctx-item" onclick="addBlock('condition')"><span class="text-bcond text-xl">●</span> Условие (If/Else)</div>
        <div class="ctx-item" onclick="addBlock('delay')"><span class="text-bdelay text-xl">●</span> Задержка (Таймер)</div>
        <div class="ctx-item" onclick="addBlock('random')"><span class="text-brand text-xl">●</span> Рандом (50/50)</div>
    </div>

    <!-- ШАБЛОНЫ НАСТРОЕК -->
    <template id="tpl-settings-start">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Команда (без /)</label><input type="text" id="prop-command" value="{command}" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none focus:border-primary"></div>
            <div><label class="block text-xs text-gray-400 mb-1">Текст</label><textarea id="prop-text" rows="4" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{text}</textarea></div>
            <div><label class="block text-xs text-gray-400 mb-1">Кнопки (каждая с новой строки)</label><textarea id="prop-buttons" rows="3" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{buttons}</textarea></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <template id="tpl-settings-message">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Текст сообщения</label><textarea id="prop-text" rows="5" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{text}</textarea></div>
            <div><label class="block text-xs text-gray-400 mb-1">Кнопки (каждая с новой строки)</label><textarea id="prop-buttons" rows="3" placeholder="Да&#10;Нет" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{buttons}</textarea></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <template id="tpl-settings-media">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Прямая ссылка на Фото (URL)</label><input type="text" id="prop-url" value="{url}" placeholder="https://..." class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none focus:border-primary"></div>
            <div><label class="block text-xs text-gray-400 mb-1">Подпись к фото</label><textarea id="prop-text" rows="3" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{text}</textarea></div>
            <div><label class="block text-xs text-gray-400 mb-1">Кнопки (каждая с новой строки)</label><textarea id="prop-buttons" rows="3" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{buttons}</textarea></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <template id="tpl-settings-question">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Вопрос пользователю</label><textarea id="prop-text" rows="3" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none resize-none focus:border-primary">{text}</textarea></div>
            <div><label class="block text-xs text-gray-400 mb-1">Куда сохранить? (имя переменной)</label><input type="text" id="prop-variable" value="{variable}" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none font-mono text-bask focus:border-primary"></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <template id="tpl-settings-condition">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Имя переменной</label><input type="text" id="prop-variable" value="{variable}" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none font-mono text-bcond focus:border-primary"></div>
            <div><label class="block text-xs text-gray-400 mb-1">Должна быть равна значению:</label><input type="text" id="prop-value" value="{value}" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none focus:border-primary"></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <template id="tpl-settings-delay">
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-400 mb-1">Пауза (в секундах):</label><input type="number" id="prop-time" value="{time}" min="1" max="60" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm outline-none font-mono text-bdelay focus:border-primary"></div>
            <button onclick="deleteSelectedBlock()" class="w-full mt-4 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>
    
    <template id="tpl-settings-random">
        <div class="space-y-4 text-center py-4">
            <p class="text-xs text-gray-400">Блок случайным образом (50% на 50%) направляет пользователя.</p>
            <button onclick="deleteSelectedBlock()" class="w-full mt-6 py-2 border border-red-900/50 text-red-500 rounded hover:bg-red-900/20 text-sm transition">Удалить блок</button>
        </div>
    </template>

    <script>
        let currentProject = { id: null, name: '', token: '', blocks: {}, connections: [], counter: 0 };
        let selectedBlockId = null;
        let isDraggingBlock = false, dragTarget = null, offset = { x: 0, y: 0 };
        let isConnecting = false, connectStartBlock = null, connectStartPort = null;
        let isPanning = false, panStart = {x:0, y:0}, scrollStart = {x:0, y:0};

        function showView(id) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-workspace').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function createNewProject() {
            currentProject = { id: Date.now(), name: `Бот_${Math.floor(Math.random()*1000)}`, token: '', blocks: {}, connections: [], counter: 0 };
            initWorkspace();
        }

        function loadProject(id) {
            const projects = JSON.parse(localStorage.getItem('tb_stable_projects') || '[]');
            const proj = projects.find(p => p.id == id);
            if(proj) { currentProject = proj; initWorkspace(); }
        }

        function initWorkspace() {
            showView('view-workspace');
            document.getElementById('project-name-display').innerText = currentProject.name;
            document.getElementById('bot-token').value = currentProject.token || '';
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.scrollLeft = 2500 - wrapper.clientWidth / 2;
            wrapper.scrollTop = 2500 - wrapper.clientHeight / 2;
            closeSettings();
            renderAll();
        }

        function backToMenu() { saveProject(); showView('view-menu'); hideProjectsList(); }

        function saveProject() {
            if(!currentProject.id) return;
            currentProject.token = document.getElementById('bot-token').value;
            let projects = JSON.parse(localStorage.getItem('tb_stable_projects') || '[]');
            const index = projects.findIndex(p => p.id === currentProject.id);
            if(index >= 0) projects[index] = currentProject;
            else projects.push(currentProject);
            localStorage.setItem('tb_stable_projects', JSON.stringify(projects));
        }

        function showProjectsList() {
            document.getElementById('projects-list').classList.remove('hidden');
            const container = document.getElementById('projects-container');
            const projects = JSON.parse(localStorage.getItem('tb_stable_projects') || '[]');
            container.innerHTML = projects.length ? projects.map(p => `
                <div class="bg-card p-5 rounded-xl border border-gray-700 flex justify-between items-center hover:border-emerald-500 transition cursor-pointer" onclick="loadProject(${p.id})">
                    <div><div class="font-bold text-xl">${p.name}</div><div class="text-sm text-gray-400 mt-1">Блоков: ${Object.keys(p.blocks).length}</div></div>
                    <button onclick="event.stopPropagation(); deleteProject(${p.id})" class="text-red-500 hover:text-red-400 bg-red-500/10 hover:bg-red-500/20 px-4 py-2 rounded-lg transition">Удалить</button>
                </div>`).join('') : '<div class="text-gray-500 text-center text-lg">Нет сохраненных проектов</div>';
        }
        function hideProjectsList() { document.getElementById('projects-list').classList.add('hidden'); }
        function deleteProject(id) {
            let projects = JSON.parse(localStorage.getItem('tb_stable_projects') || '[]');
            localStorage.setItem('tb_stable_projects', JSON.stringify(projects.filter(p => p.id != id)));
            showProjectsList();
        }

        let contextPos = { x: 0, y: 0 };
        function showContextMenu(e) {
            e.preventDefault();
            if(e.target.closest('.node-block') || isDraggingBlock || isPanning) return;
            const menu = document.getElementById('context-menu');
            menu.style.left = `${e.clientX}px`; menu.style.top = `${e.clientY}px`;
            menu.classList.remove('hidden');
            const wrapper = document.getElementById('canvas-wrapper');
            const rect = wrapper.getBoundingClientRect();
            contextPos = { x: e.clientX - rect.left + wrapper.scrollLeft, y: e.clientY - rect.top + wrapper.scrollTop };
        }

        document.addEventListener('click', e => { if(!e.target.closest('#context-menu')) document.getElementById('context-menu').classList.add('hidden'); });

        function getDefaults(type) {
            if (type === 'start') return { command: 'start', text: 'Добро пожаловать!', buttons: 'Далее' };
            if (type === 'message') return { text: 'Текст сообщения...', buttons: '' };
            if (type === 'media') return { url: 'https://via.placeholder.com/400', text: 'Описание', buttons: '' };
            if (type === 'question') return { text: 'Как вас зовут?', variable: 'name' };
            if (type === 'condition') return { variable: 'name', value: 'Админ' };
            if (type === 'delay') return { time: '2' };
            if (type === 'random') return {};
        }

        function addBlock(type) {
            document.getElementById('context-menu').classList.add('hidden');
            currentProject.counter++;
            const id = `node_${currentProject.counter}`;
            currentProject.blocks[id] = { id, type, x: contextPos.x, y: contextPos.y, data: getDefaults(type) };
            renderAll(); openSettings(id);
        }

        function deleteSelectedBlock() {
            if(!selectedBlockId) return;
            delete currentProject.blocks[selectedBlockId];
            currentProject.connections = currentProject.connections.filter(c => c.from !== selectedBlockId && c.to !== selectedBlockId);
            closeSettings(); renderAll(); drawLines();
        }

        function renderAll() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            Object.values(currentProject.blocks).forEach(block => {
                const el = document.createElement('div');
                el.className = `node-block header-${block.type} ${selectedBlockId === block.id ? 'selected' : ''}`;
                el.id = block.id; el.style.left = `${block.x}px`; el.style.top = `${block.y}px`;

                const icons = { start: '🟢 Старт', message: '🔵 Сообщение', media: '🖼 Медиа', question: '🟠 Вопрос', condition: '⚖️ Условие', delay: '⏳ Задержка', random: '🎲 Рандом' };
                let preview = block.data.text || block.data.command || (block.type==='delay'?block.data.time+' сек':'') || (block.type==='random'?'50/50':'...');
                
                let content = `
                    <div class="px-4 py-2 border-b border-gray-800 flex justify-between items-center bg-black/40 rounded-t-[10px]" onmousedown="startDragBlock(event, '${block.id}')">
                        <span class="text-[11px] font-bold text-gray-200 uppercase tracking-widest">${icons[block.type]}</span>
                        <span class="text-[10px] text-gray-500 bg-dark px-1.5 py-0.5 rounded">#${block.id.split('_')[1]}</span>
                    </div>
                    <div class="p-4 text-[13px] text-gray-300 break-words leading-snug" onmousedown="startDragBlock(event, '${block.id}')">${preview.substring(0, 60)}${preview.length > 60 ? '...' : ''}</div>
                `;

                if (block.type !== 'start') content += `<div class="port port-in" data-node="${block.id}" title="Вход"></div>`;

                if (block.type === 'condition') {
                    content += `<div class="p-2 pt-0 space-y-1"><div class="node-btn text-emerald-400 bg-emerald-900/20">Правда <div class="port port-out" data-node="${block.id}" data-port="true" onmousedown="startConnect(event, '${block.id}', 'true')"></div></div><div class="node-btn text-rose-400 bg-rose-900/20">Ложь <div class="port port-out" data-node="${block.id}" data-port="false" onmousedown="startConnect(event, '${block.id}', 'false')"></div></div></div>`;
                } else if (block.type === 'random') {
                    content += `<div class="p-2 pt-0 space-y-1"><div class="node-btn text-purple-300 bg-purple-900/20">Вариант А <div class="port port-out" data-node="${block.id}" data-port="a" onmousedown="startConnect(event, '${block.id}', 'a')"></div></div><div class="node-btn text-indigo-300 bg-indigo-900/20">Вариант Б <div class="port port-out" data-node="${block.id}" data-port="b" onmousedown="startConnect(event, '${block.id}', 'b')"></div></div></div>`;
                } else if (block.type === 'question' || block.type === 'delay') {
                    content += `<div class="port port-out" data-node="${block.id}" data-port="out" onmousedown="startConnect(event, '${block.id}', 'out')" title="Далее"></div>`;
                } else {
                    const btns = (block.data.buttons || '').split('\n').filter(b => b.trim() !== '');
                    if (btns.length > 0) {
                        let btnsHtml = '<div class="px-3 pb-3 space-y-1.5">';
                        btns.forEach((btn, idx) => { btnsHtml += `<div class="node-btn text-primary">${btn} <div class="port port-out" data-node="${block.id}" data-port="btn_${idx}" onmousedown="startConnect(event, '${block.id}', 'btn_${idx}')"></div></div>`; });
                        content += btnsHtml + '</div>';
                    } else {
                        content += `<div class="port port-out" data-node="${block.id}" data-port="out" onmousedown="startConnect(event, '${block.id}', 'out')" title="Далее"></div>`;
                    }
                }
                el.innerHTML = content;
                el.addEventListener('click', (e) => { if(!e.target.classList.contains('port')) openSettings(block.id); });
                container.appendChild(el);
            });
            drawLines();
        }

        function startDragBlock(e, id) {
            isDraggingBlock = true; dragTarget = id;
            const rect = document.getElementById(id).getBoundingClientRect();
            offset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }
        function startPan(e) {
            if(e.target.id !== 'canvas-wrapper' && e.target.id !== 'svg-canvas') return;
            isPanning = true; panStart = { x: e.clientX, y: e.clientY };
            const wrapper = document.getElementById('canvas-wrapper');
            scrollStart = { x: wrapper.scrollLeft, y: wrapper.scrollTop };
        }
        document.getElementById('canvas-wrapper').addEventListener('mousemove', e => {
            const wrapper = document.getElementById('canvas-wrapper');
            const rect = wrapper.getBoundingClientRect();
            const canvasX = e.clientX - rect.left + wrapper.scrollLeft;
            const canvasY = e.clientY - rect.top + wrapper.scrollTop;

            if (isPanning) {
                wrapper.scrollLeft = scrollStart.x - (e.clientX - panStart.x);
                wrapper.scrollTop = scrollStart.y - (e.clientY - panStart.y);
            }
            if (isDraggingBlock && dragTarget) {
                currentProject.blocks[dragTarget].x = canvasX - offset.x;
                currentProject.blocks[dragTarget].y = canvasY - offset.y;
                document.getElementById(dragTarget).style.left = `${currentProject.blocks[dragTarget].x}px`;
                document.getElementById(dragTarget).style.top = `${currentProject.blocks[dragTarget].y}px`;
                drawLines();
            }
            if (isConnecting && connectStartBlock) {
                let tempLine = document.getElementById('temp-line');
                if (!tempLine) {
                    tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    tempLine.id = 'temp-line'; tempLine.className.baseVal = 'temp-line';
                    document.getElementById('svg-canvas').appendChild(tempLine);
                }
                const startPortEl = document.querySelector(`.port-out[data-node="${connectStartBlock}"][data-port="${connectStartPort}"]`);
                if(startPortEl) {
                    const portRect = startPortEl.getBoundingClientRect();
                    const startX = portRect.left + portRect.width/2 - rect.left + wrapper.scrollLeft;
                    const startY = portRect.top + portRect.height/2 - rect.top + wrapper.scrollTop;
                    tempLine.setAttribute('d', `M ${startX} ${startY} C ${startX + 100} ${startY}, ${canvasX - 100} ${canvasY}, ${canvasX} ${canvasY}`);
                }
            }
        });

        document.addEventListener('mouseup', e => {
            isDraggingBlock = false; isPanning = false;
            if (isConnecting) {
                const temp = document.getElementById('temp-line');
                if(temp) temp.remove();
                const dropTarget = e.target.closest('.port-in');
                if (dropTarget && connectStartBlock) {
                    const targetNodeId = dropTarget.dataset.node;
                    if (targetNodeId !== connectStartBlock) {
                        currentProject.connections = currentProject.connections.filter(c => !(c.from === connectStartBlock && c.fromPort === connectStartPort));
                        currentProject.connections.push({ from: connectStartBlock, fromPort: connectStartPort, to: targetNodeId });
                    }
                }
                isConnecting = false; connectStartBlock = null; drawLines();
            }
        });

        function startConnect(e, nodeId, portId) { e.stopPropagation(); e.preventDefault(); isConnecting = true; connectStartBlock = nodeId; connectStartPort = portId; }

        function drawLines() {
            const svg = document.getElementById('svg-canvas');
            svg.innerHTML = ''; 
            const wrapper = document.getElementById('canvas-wrapper');
            const wrapperRect = wrapper.getBoundingClientRect();

            currentProject.connections.forEach(conn => {
                const portOut = document.querySelector(`.port-out[data-node="${conn.from}"][data-port="${conn.fromPort}"]`);
                const portIn = document.querySelector(`.port-in[data-node="${conn.to}"]`);
                if (portOut && portIn) {
                    const outRect = portOut.getBoundingClientRect();
                    const inRect = portIn.getBoundingClientRect();
                    const startX = outRect.left + outRect.width/2 - wrapperRect.left + wrapper.scrollLeft;
                    const startY = outRect.top + outRect.height/2 - wrapperRect.top + wrapper.scrollTop;
                    const endX = inRect.left + inRect.width/2 - wrapperRect.left + wrapper.scrollLeft;
                    const endY = inRect.top + inRect.height/2 - wrapperRect.top + wrapper.scrollTop;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const control = Math.max(Math.abs(endX - startX) * 0.5, 60);
                    path.setAttribute('d', `M ${startX} ${startY} C ${startX + control} ${startY}, ${endX - control} ${endY}, ${endX} ${endY}`);
                    path.setAttribute('class', 'connection-line');
                    path.addEventListener('click', () => { currentProject.connections = currentProject.connections.filter(c => c !== conn); drawLines(); });
                    svg.appendChild(path);
                }
            });
        }

        function openSettings(id) {
            selectedBlockId = id;
            document.getElementById('settings-panel').classList.remove('translate-x-full');
            renderAll();
            const block = currentProject.blocks[id];
            let html = document.getElementById(`tpl-settings-${block.type}`).innerHTML;
            Object.keys(block.data).forEach(key => html = html.replace(new RegExp(`{${key}}`, 'g'), block.data[key]||''));
            const content = document.getElementById('settings-content');
            content.innerHTML = html;

            content.querySelectorAll('input, textarea, select').forEach(el => {
                el.addEventListener('input', e => {
                    const prop = e.target.id.replace('prop-', '');
                    block.data[prop] = e.target.value;
                    if(prop === 'buttons') {
                        const btnCount = e.target.value.split('\n').filter(b=>b.trim()).length;
                        currentProject.connections = currentProject.connections.filter(c => {
                            if(c.from === block.id) {
                                if(c.fromPort === 'out' && btnCount > 0) return false;
                                if(c.fromPort.startsWith('btn_') && parseInt(c.fromPort.split('_')[1]) >= btnCount) return false;
                            }
                            return true;
                        });
                    }
                    renderAll(); 
                });
            });
        }

        function closeSettings() { document.getElementById('settings-panel').classList.add('translate-x-full'); selectedBlockId = null; renderAll(); }
        window.addEventListener('resize', drawLines);

        // --- ГЕНЕРАТОР PYTHON ---
        function exportBot() {
            const token = document.getElementById('bot-token').value.trim();
            if(!token) return alert('Пожалуйста, введите токен бота вверху!');

            let code = `import telebot\nfrom telebot import types\nimport time\nimport random\n\n`;
            code += `BOT_TOKEN = '${token}'\nbot = telebot.TeleBot(BOT_TOKEN)\nuser_data = {}\n\n`;

            code += `def format_text(text, chat_id):\n`;
            code += `    data = user_data.get(chat_id, {})\n`;
            code += `    for key, val in data.items(): text = text.replace(f"{{{key}}}", str(val))\n`;
            code += `    return text\n\n`;

            const blocks = currentProject.blocks;
            const conns = currentProject.connections;

            // Определяем все функции блоков
            code += `# --- БЛОКИ ---\n`;
            Object.values(blocks).forEach(b => {
                code += `def execute_${b.id}(chat_id):\n`;
                code += `    print(f"Выполняется блок {b.id} для {chat_id}")\n`;
                code += `    if chat_id not in user_data: user_data[chat_id] = {}\n`;

                if (b.type === 'start' || b.type === 'message' || b.type === 'media') {
                    const btns = (b.data.buttons || '').split('\n').filter(x => x.trim());
                    code += `    text = format_text("""${(b.data.text||'').replace(/"/g, '\\"')}""", chat_id)\n`;
                    
                    if (btns.length > 0) {
                        code += `    markup = types.InlineKeyboardMarkup()\n`;
                        btns.forEach((btn, idx) => {
                            const link = conns.find(c => c.from === b.id && c.fromPort === `btn_${idx}`);
                            const target = link ? link.to : 'none';
                            code += `    markup.add(types.InlineKeyboardButton(text="${btn.replace(/"/g, '\\"')}", callback_data="cb_${target}"))\n`;
                        });
                        if (b.type === 'media') code += `    bot.send_photo(chat_id, "${b.data.url}", caption=text, reply_markup=markup)\n`;
                        else code += `    bot.send_message(chat_id, text, reply_markup=markup)\n`;
                    } else {
                        if (b.type === 'media') code += `    bot.send_photo(chat_id, "${b.data.url}", caption=text)\n`;
                        else code += `    bot.send_message(chat_id, text)\n`;
                        
                        const link = conns.find(c => c.from === b.id && c.fromPort === 'out');
                        if (link) code += `    route_step(chat_id, '${link.to}')\n`;
                    }
                }
                
                else if (b.type === 'question') {
                    code += `    text = format_text("""${(b.data.text||'').replace(/"/g, '\\"')}""", chat_id)\n`;
                    code += `    msg = bot.send_message(chat_id, text)\n`;
                    code += `    bot.register_next_step_handler(msg, process_${b.id})\n\n`;
                    
                    code += `def process_${b.id}(message):\n`;
                    code += `    if message.text and message.text.startswith('/'): return # Игнорируем команды\n`;
                    code += `    chat_id = message.chat.id\n`;
                    code += `    if chat_id not in user_data: user_data[chat_id] = {}\n`;
                    code += `    user_data[chat_id]['${b.data.variable}'] = message.text\n`;
                    const link = conns.find(c => c.from === b.id && c.fromPort === 'out');
                    if (link) code += `    route_step(chat_id, '${link.to}')\n`;
                }

                else if (b.type === 'condition') {
                    code += `    val = str(user_data.get(chat_id, {}).get('${b.data.variable}', '')).strip().lower()\n`;
                    code += `    if val == "${(b.data.value||'').toLowerCase()}":\n`;
                    const linkTrue = conns.find(c => c.from === b.id && c.fromPort === 'true');
                    if (linkTrue) code += `        route_step(chat_id, '${linkTrue.to}')\n`; else code += `        pass\n`;
                    code += `    else:\n`;
                    const linkFalse = conns.find(c => c.from === b.id && c.fromPort === 'false');
                    if (linkFalse) code += `        route_step(chat_id, '${linkFalse.to}')\n`; else code += `        pass\n`;
                }

                else if (b.type === 'delay') {
                    code += `    time.sleep(${b.data.time || 1})\n`;
                    const link = conns.find(c => c.from === b.id && c.fromPort === 'out');
                    if (link) code += `    route_step(chat_id, '${link.to}')\n`;
                }

                else if (b.type === 'random') {
                    code += `    if random.choice([True, False]):\n`;
                    const linkA = conns.find(c => c.from === b.id && c.fromPort === 'a');
                    if (linkA) code += `        route_step(chat_id, '${linkA.to}')\n`; else code += `        pass\n`;
                    code += `    else:\n`;
                    const linkB = conns.find(c => c.from === b.id && c.fromPort === 'b');
                    if (linkB) code += `        route_step(chat_id, '${linkB.to}')\n`; else code += `        pass\n`;
                }
                code += `\n`;
            });

            // Жесткий Роутер
            code += `# --- РОУТЕР ---\n`;
            code += `def route_step(chat_id, target_node):\n`;
            code += `    try: bot.clear_step_handler_by_chat_id(chat_id)\n`;
            code += `    except: pass\n\n`;
            code += `    print(f"Перенаправление на блок {target_node}")\n`;
            
            Object.keys(blocks).forEach((id, index) => {
                if (index === 0) code += `    if target_node == '${id}': execute_${id}(chat_id)\n`;
                else code += `    elif target_node == '${id}': execute_${id}(chat_id)\n`;
            });
            code += `    else: print(f"Блок {target_node} не найден!")\n\n`;

            // Команды
            Object.values(blocks).filter(b => b.type === 'start').forEach(sb => {
                const cmd = (sb.data.command||'').replace('/', '').trim() || 'start';
                code += `@bot.message_handler(commands=['${cmd}'])\n`;
                code += `def cmd_${sb.id}(message):\n    route_step(message.chat.id, '${sb.id}')\n\n`;
            });

            // Обработчик кнопок
            code += `@bot.callback_query_handler(func=lambda call: call.data.startswith('cb_'))\n`;
            code += `def callback_handler(call):\n`;
            code += `    try: bot.answer_callback_query(call.id)\n`;
            code += `    except: pass\n\n`;
            code += `    target = call.data.replace('cb_', '')\n`;
            code += `    print(f"Нажата кнопка. Переход к: {target}")\n`;
            code += `    if target != 'none':\n`;
            code += `        route_step(call.message.chat.id, target)\n\n`;

            code += `if __name__ == '__main__':\n`;
            code += `    print("Бот запущен. Логи работы будут выводиться сюда.")\n`;
            code += `    bot.infinity_polling()\n`;

            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([code], { type: "text/x-python" }));
            a.download = `${currentProject.name || 'bot'}.py`;
            a.click();
        }
    </script>
